version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gci
    - gofmt

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/riyanamanda/helpdesk-backend)
      custom-order: true

linters:
  default: none

  enable:
    # existing
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # correctness
    - bodyclose       # HTTP response body must be closed
    - errorlint       # correct use of Go 1.13 error wrapping
    - sqlclosecheck   # sql.Rows / sqlx must be closed
    - rowserrcheck    # sql.Rows.Err() must be checked
    - copyloopvar     # loop variable capture issues
    - nilerr          # don't return nil after checking err != nil
    - exhaustive      # switch on enum types must be exhaustive

    # quality
    - gocritic        # broad diagnostic and style checks
    - revive          # configurable drop-in for golint
    - misspell        # typos in comments and strings
    - nolintlint      # nolint directives must be specific and necessary
    - sloglint        # consistent log/slog usage
    - recvcheck       # receiver type consistency within a type

  settings:
    exhaustive:
      default-signifies-exhaustive: true

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - commentedOutCode   # common during development
        - hugeParam          # too many false positives with value receivers
        - exitAfterDefer     # intentional in server startup paths
        - unnamedResult      # naming return values is a style choice

    revive:
      rules:
        - name: exported
          disabled: true     # no godoc required on all exported symbols
        - name: var-naming
          disabled: false
        - name: unused-parameter
          disabled: false
        - name: error-return
          disabled: false
        - name: early-return
          disabled: false
        - name: superfluous-else
          disabled: false

    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx

    sloglint:
      no-mixed-args: true
      kv-only: false
      attr-only: false
      static-msg: false
      no-raw-keys: false
      key-naming-case: snake

    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

exclusions:
  rules:
    # tests: relax error checking and body-close rules
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose

    # test lambdas commonly have unused params for signature consistency
    - path: _test\.go
      linters:
        - revive
      text: unused-parameter

    # auto-generated mocks: skip style/quality linters
    - path: mocks/
      linters:
        - revive
        - gocritic
        - unused
        - nolintlint

  # seed files use direct DB calls without error propagation
  paths:
    - internal/seed
